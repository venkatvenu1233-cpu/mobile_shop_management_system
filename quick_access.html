<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOBILE ENGINEER - Quick Access</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }
        .access-container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
        }
        .logo {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 20px;
        }
        .title {
            font-size: 24px;
            color: #333;
            margin-bottom: 30px;
        }
        .access-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: block;
            transition: all 0.3s ease;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-info {
            background: linear-gradient(135deg, #17a2b8 0%, #138496 100%);
            color: white;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .note {
            margin-top: 20px;
            font-size: 14px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="access-container">
        <div class="logo">🛠️ MOBILE ENGINEER</div>
        <h1 class="title">Quick Access Portal</h1>
        
        <div class="access-buttons">
            <a href="http://127.0.0.1:5000" class="btn btn-primary">🏠 Main Dashboard</a>
            <a href="http://127.0.0.1:5000/products" class="btn btn-info">📱 Standard Products</a>
            <a href="http://127.0.0.1:5000/products-flipkart" class="btn btn-info">🛍️ Flipkart Style Products</a>
            <a href="http://127.0.0.1:5000/customers" class="btn btn-info">👥 Customers</a>
            <a href="http://127.0.0.1:5000/billing" class="btn btn-info">💰 Billing</a>
            <a href="http://127.0.0.1:5000/reports" class="btn btn-info">📊 Reports</a>
        </div>
        
        <div class="note">
            <p><strong>Note:</strong> Make sure the Flask server is running on port 5000</p>
            <p>🚀 Your Flipkart-style products page is ready with brand logos, product images, and 360° views!</p>
        </div>
    </div>
</body>
</html>
