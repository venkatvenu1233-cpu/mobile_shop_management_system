<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders - Mobile Engineer</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #1a202c;
        }

        /* Header Navigation */
        .navbar {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        .nav-menu {
            display: flex;
            gap: 25px;
            align-items: center;
        }

        .nav-link {
            color: #4a5568;
            text-decoration: none;
            font-weight: 600;
            padding: 10px 20px;
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .nav-link:hover {
            color: #667eea;
            transform: translateY(-2px);
        }

        .nav-link.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .cart-button {
            position: relative;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 12px 20px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .cart-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .cart-count {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #ef4444;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
        }

        /* Profile Dropdown */
        .profile-dropdown {
            position: relative;
        }

        .profile-button {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border: 2px solid #334155;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .profile-button:hover {
            background: linear-gradient(135deg, #334155 0%, #1e293b 100%);
            border-color: #667eea;
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .profile-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
        }

        .profile-menu {
            position: absolute;
            top: calc(100% + 10px);
            right: 0;
            min-width: 220px;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border: 1px solid #334155;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px) scale(0.95);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
            overflow: hidden;
        }

        .profile-menu.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0) scale(1);
        }

        .profile-header {
            padding: 20px;
            background: linear-gradient(135deg, #334155 0%, #1e293b 100%);
            border-bottom: 1px solid #475569;
        }

        .profile-name {
            font-size: 16px;
            font-weight: 700;
            color: white;
            margin-bottom: 4px;
        }

        .profile-email {
            font-size: 12px;
            color: #94a3b8;
        }

        .profile-menu-items {
            padding: 8px;
        }

        .profile-menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 10px;
            color: #e2e8f0;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .profile-menu-item:hover {
            background: linear-gradient(135deg, #334155 0%, #475569 100%);
            color: white;
            transform: translateX(4px);
        }

        .profile-menu-item.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .profile-menu-item i {
            width: 20px;
            text-align: center;
            font-size: 16px;
            color: #667eea;
        }

        .profile-menu-item:hover i, .profile-menu-item.active i {
            color: white;
        }

        .profile-menu-divider {
            height: 1px;
            background: #334155;
            margin: 8px 12px;
        }

        .profile-menu-item.logout {
            color: #ef4444;
        }

        .profile-menu-item.logout:hover {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
        }

        /* Main Container */
        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px;
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 30px;
        }

        /* Sidebar */
        .sidebar {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            height: fit-content;
            position: sticky;
            top: 90px;
        }

        .sidebar-header {
            text-align: center;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f1f5f9;
        }

        .sidebar-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            font-size: 40px;
            color: white;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
            overflow: hidden;
        }

        .sidebar-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .sidebar-name {
            font-size: 18px;
            font-weight: 700;
            color: #1a202c;
            margin-bottom: 5px;
        }

        .sidebar-email {
            font-size: 13px;
            color: #718096;
        }

        .sidebar-menu {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .sidebar-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 18px;
            border-radius: 12px;
            color: #4a5568;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .sidebar-item:hover {
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            color: #667eea;
            transform: translateX(5px);
        }

        .sidebar-item.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3);
        }

        .sidebar-item i {
            width: 24px;
            text-align: center;
            font-size: 18px;
        }

        /* Content Area */
        .content-area {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 35px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
        }

        .page-title {
            font-size: 28px;
            font-weight: 800;
            color: #1a202c;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            border-radius: 16px;
            padding: 25px;
            text-align: center;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.1);
            border-color: #667eea;
        }

        .stat-icon {
            width: 60px;
            height: 60px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            font-size: 28px;
        }

        .stat-icon.all { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .stat-icon.pending { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); color: white; }
        .stat-icon.delivered { background: linear-gradient(135deg, #10b981 0%, #059669 100%); color: white; }
        .stat-icon.cancelled { background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); color: white; }

        .stat-number {
            font-size: 32px;
            font-weight: 800;
            color: #1a202c;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 14px;
            color: #718096;
            font-weight: 600;
        }

        /* Filter Bar */
        .filter-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 12px 24px;
            border-radius: 25px;
            border: 2px solid #e2e8f0;
            background: white;
            color: #4a5568;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-btn:hover {
            border-color: #667eea;
            color: #667eea;
        }

        .filter-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #667eea;
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3);
        }

        /* Orders List */
        .orders-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .order-card {
            background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%);
            border: 2px solid #e2e8f0;
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .order-card:hover {
            border-color: #667eea;
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.15);
            transform: translateY(-3px);
        }

        .order-header {
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            padding: 20px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .order-info {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }

        .order-info-item {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .info-label {
            font-size: 12px;
            color: #718096;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .info-value {
            font-size: 15px;
            font-weight: 700;
            color: #1a202c;
        }

        .order-status {
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: 700;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-pending {
            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
            color: #92400e;
        }

        .status-processing {
            background: linear-gradient(135deg, #dbeafe 0%, #bfdbfe 100%);
            color: #1e40af;
        }

        .status-shipped {
            background: linear-gradient(135deg, #e0e7ff 0%, #c7d2fe 100%);
            color: #3730a3;
        }

        .status-delivered {
            background: linear-gradient(135deg, #d1fae5 0%, #a7f3d0 100%);
            color: #065f46;
        }

        .status-cancelled {
            background: linear-gradient(135deg, #fee2e2 0%, #fecaca 100%);
            color: #991b1b;
        }

        .order-body {
            padding: 25px;
        }

        .order-items {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 20px;
        }

        .order-item {
            display: flex;
            gap: 20px;
            padding: 15px;
            background: white;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
        }

        .item-image {
            width: 80px;
            height: 80px;
            border-radius: 10px;
            object-fit: cover;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: block;
            min-height: 80px;
        }

        .item-details {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .item-name {
            font-size: 16px;
            font-weight: 700;
            color: #1a202c;
            margin-bottom: 5px;
        }

        .item-brand {
            font-size: 14px;
            color: #667eea;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .item-meta {
            font-size: 13px;
            color: #718096;
        }

        .item-price {
            font-size: 18px;
            font-weight: 800;
            color: #1a202c;
            display: flex;
            align-items: center;
        }

        .order-footer {
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            padding: 20px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .order-total {
            font-size: 18px;
            font-weight: 700;
            color: #1a202c;
        }

        .order-total span {
            color: #667eea;
            font-size: 24px;
        }

        .order-actions {
            display: flex;
            gap: 12px;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: white;
            color: #4a5568;
            border: 2px solid #e2e8f0;
        }

        .btn-secondary:hover {
            border-color: #667eea;
            color: #667eea;
            transform: translateY(-2px);
        }

        .btn-danger {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
        }

        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(239, 68, 68, 0.4);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 80px 40px;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            border-radius: 20px;
            border: 2px dashed #cbd5e1;
        }

        .empty-icon {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #e2e8f0 0%, #cbd5e1 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 25px;
            font-size: 50px;
            color: #667eea;
        }

        .empty-title {
            font-size: 28px;
            font-weight: 700;
            color: #1a202c;
            margin-bottom: 12px;
        }

        .empty-text {
            font-size: 16px;
            color: #718096;
            margin-bottom: 30px;
        }

        /* Order Detail Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            animation: fadeIn 0.3s ease;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: white;
            border-radius: 20px;
            width: 100%;
            max-width: 700px;
            max-height: 90vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.3);
        }

        .modal-header {
            padding: 25px 30px;
            border-bottom: 2px solid #f1f5f9;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title {
            font-size: 22px;
            font-weight: 700;
            color: #1a202c;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .modal-close {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: #f1f5f9;
            border: none;
            color: #4a5568;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .modal-close:hover {
            background: #e2e8f0;
            color: #1a202c;
            transform: rotate(90deg);
        }

        .modal-body {
            padding: 30px;
        }

        .detail-section {
            margin-bottom: 25px;
            padding-bottom: 25px;
            border-bottom: 1px solid #e2e8f0;
        }

        .detail-section:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        .detail-title {
            font-size: 16px;
            font-weight: 700;
            color: #1a202c;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .detail-title i {
            color: #667eea;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            font-size: 15px;
        }

        .detail-label {
            color: #718096;
            font-weight: 500;
        }

        .detail-value {
            color: #1a202c;
            font-weight: 700;
        }

        .timeline {
            display: flex;
            flex-direction: column;
            gap: 0;
            margin-top: 15px;
        }

        .timeline-item {
            display: flex;
            gap: 20px;
            padding: 15px 0;
            position: relative;
        }

        .timeline-item:not(:last-child)::before {
            content: '';
            position: absolute;
            left: 19px;
            top: 50px;
            width: 2px;
            height: calc(100% - 20px);
            background: #e2e8f0;
        }

        .timeline-dot {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 16px;
        }

        .timeline-dot.completed {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
        }

        .timeline-dot.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            animation: pulse 2s infinite;
        }

        .timeline-dot.pending {
            background: #e2e8f0;
            color: #718096;
        }

        .timeline-content {
            flex: 1;
        }

        .timeline-title {
            font-weight: 700;
            color: #1a202c;
            margin-bottom: 5px;
        }

        .timeline-date {
            font-size: 13px;
            color: #718096;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* Notification */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 16px 24px;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            z-index: 10000;
            animation: slideIn 0.3s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .notification.success {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Responsive */
        @media (max-width: 1200px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 1024px) {
            .main-container {
                grid-template-columns: 1fr;
            }

            .sidebar {
                position: static;
            }
        }

        @media (max-width: 768px) {
            .nav-menu {
                display: none;
            }

            .main-container {
                padding: 15px;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .order-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .order-info {
                gap: 15px;
            }

            .order-item {
                flex-direction: column;
                text-align: center;
            }

            .order-footer {
                flex-direction: column;
                text-align: center;
            }

            .order-actions {
                width: 100%;
                justify-content: center;
            }

            .content-area {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="/dashboard" class="nav-brand">
                <i class="fas fa-mobile-alt"></i>
                MOBILE ENGINEER
            </a>
            <div class="nav-menu">
                <a href="/dashboard" class="nav-link">Dashboard</a>
                <a href="/mobiles" class="nav-link">Mobiles</a>
                <a href="/accessories" class="nav-link">Accessories</a>
                <a href="/basic-service" class="nav-link">Services</a>
                <a href="/cart" class="cart-button">
                    <i class="fas fa-shopping-cart"></i>
                    Cart
                    <span class="cart-count" id="cartCount">0</span>
                </a>
                <div class="profile-dropdown">
                    <button class="profile-button" onclick="toggleProfileMenu()">
                        <div class="profile-avatar">
                            <i class="fas fa-user"></i>
                        </div>
                        <span>Profile</span>
                        <i class="fas fa-chevron-down" style="font-size: 12px;"></i>
                    </button>
                    <div class="profile-menu" id="profileMenu">
                        <div class="profile-header">
                            <div class="profile-name" id="navProfileName">User Name</div>
                            <div class="profile-email" id="navProfileEmail">user@example.com</div>
                        </div>
                        <div class="profile-menu-items">
                            <a href="/edit-profile" class="profile-menu-item">
                                <i class="fas fa-edit"></i>
                                <span>Edit Profile</span>
                            </a>
                            <a href="/saved-address" class="profile-menu-item">
                                <i class="fas fa-map-marker-alt"></i>
                                <span>Saved Addresses</span>
                            </a>
                            <a href="/orders" class="profile-menu-item active">
                                <i class="fas fa-shopping-bag"></i>
                                <span>My Orders</span>
                            </a>
                            <div class="profile-menu-divider"></div>
                            <a href="#" class="profile-menu-item logout" onclick="handleLogout()">
                                <i class="fas fa-sign-out-alt"></i>
                                <span>Logout</span>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Container -->
    <div class="main-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-avatar" id="sidebarAvatar">
                    <i class="fas fa-user"></i>
                </div>
                <div class="sidebar-name" id="sidebarName">User Name</div>
                <div class="sidebar-email" id="sidebarEmail">user@example.com</div>
            </div>
            <nav class="sidebar-menu">
                <a href="/edit-profile" class="sidebar-item">
                    <i class="fas fa-user-edit"></i>
                    Edit Profile
                </a>
                <a href="/saved-address" class="sidebar-item">
                    <i class="fas fa-map-marker-alt"></i>
                    Saved Addresses
                </a>
                <a href="/orders" class="sidebar-item active">
                    <i class="fas fa-shopping-bag"></i>
                    My Orders
                </a>
                <a href="/dashboard" class="sidebar-item">
                    <i class="fas fa-home"></i>
                    Dashboard
                </a>
                <a href="#" class="sidebar-item logout" onclick="handleLogout()">
                    <i class="fas fa-sign-out-alt"></i>
                    Logout
                </a>
            </nav>
        </aside>

        <!-- Content Area -->
        <main class="content-area">
            <h1 class="page-title">
                <i class="fas fa-shopping-bag"></i>
                My Orders
            </h1>

            <!-- Stats -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon all">
                        <i class="fas fa-shopping-bag"></i>
                    </div>
                    <div class="stat-number" id="statAll">0</div>
                    <div class="stat-label">Total Orders</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon pending">
                        <i class="fas fa-clock"></i>
                    </div>
                    <div class="stat-number" id="statPending">0</div>
                    <div class="stat-label">Pending</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon delivered">
                        <i class="fas fa-check-circle"></i>
                    </div>
                    <div class="stat-number" id="statDelivered">0</div>
                    <div class="stat-label">Delivered</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon cancelled">
                        <i class="fas fa-times-circle"></i>
                    </div>
                    <div class="stat-number" id="statCancelled">0</div>
                    <div class="stat-label">Cancelled</div>
                </div>
            </div>

            <!-- Filter Bar -->
            <div class="filter-bar">
                <button class="filter-btn active" onclick="filterOrders('all')">
                    <i class="fas fa-list"></i> All Orders
                </button>
                <button class="filter-btn" onclick="filterOrders('pending')">
                    <i class="fas fa-clock"></i> Pending
                </button>
                <button class="filter-btn" onclick="filterOrders('processing')">
                    <i class="fas fa-cog"></i> Processing
                </button>
                <button class="filter-btn" onclick="filterOrders('shipped')">
                    <i class="fas fa-shipping-fast"></i> Shipped
                </button>
                <button class="filter-btn" onclick="filterOrders('delivered')">
                    <i class="fas fa-check-circle"></i> Delivered
                </button>
                <button class="filter-btn" onclick="filterOrders('cancelled')">
                    <i class="fas fa-times-circle"></i> Cancelled
                </button>
            </div>

            <!-- Orders List -->
            <div id="ordersContainer" class="orders-list">
                <!-- Orders will be rendered here -->
            </div>
        </main>
    </div>

    <!-- Order Detail Modal -->
    <div class="modal-overlay" id="orderModal">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title">
                    <i class="fas fa-file-invoice"></i>
                    Order Details
                </h2>
                <button class="modal-close" onclick="closeOrderModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- Order details will be rendered here -->
            </div>
        </div>
    </div>

    <script>
        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            loadProfileData();
            renderOrders();
            updateStats();
            updateCartCount();
        });

        // Profile Dropdown
        function toggleProfileMenu() {
            const menu = document.getElementById('profileMenu');
            menu.classList.toggle('active');
        }

        function handleLogout() {
            localStorage.removeItem('cart');
            localStorage.removeItem('checkoutData');
            showNotification('Logged out successfully', 'success');
            setTimeout(() => window.location.href = '/login', 1000);
        }

        document.addEventListener('click', function(event) {
            const profileDropdown = document.querySelector('.profile-dropdown');
            const profileMenu = document.getElementById('profileMenu');
            if (profileDropdown && !profileDropdown.contains(event.target)) {
                profileMenu.classList.remove('active');
            }
        });

        function updateCartCount() {
            const cartCount = document.getElementById('cartCount');
            if (!cartCount) return;
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            cartCount.textContent = totalItems;
        }

        // Profile Data
        function loadProfileData() {
            const profileData = JSON.parse(localStorage.getItem('profileData')) || {
                firstName: 'User',
                lastName: 'Name',
                email: 'user@example.com',
                photo: null
            };

            const fullName = profileData.firstName + ' ' + profileData.lastName;
            document.getElementById('sidebarName').textContent = fullName;
            document.getElementById('sidebarEmail').textContent = profileData.email;
            document.getElementById('navProfileName').textContent = fullName;
            document.getElementById('navProfileEmail').textContent = profileData.email;

            if (profileData.photo) {
                document.getElementById('sidebarAvatar').innerHTML = `<img src="${profileData.photo}" alt="Profile">`;
            }
        }

        // Sample Orders Data - Empty, ready for new orders from checkout
        function getOrders() {
            const orders = JSON.parse(localStorage.getItem('orders')) || [];
            console.log('Orders loaded from localStorage:', orders);
            return orders;
        }

        let currentFilter = 'all';

        function renderOrders() {
            const container = document.getElementById('ordersContainer');
            const orders = getOrders();
            
            const filteredOrders = currentFilter === 'all' 
                ? orders 
                : orders.filter(o => o.status === currentFilter);

            if (filteredOrders.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">
                            <i class="fas fa-shopping-bag"></i>
                        </div>
                        <h3 class="empty-title">No Orders Found</h3>
                        <p class="empty-text">${currentFilter === 'all' ? 'You haven\'t placed any orders yet.' : `No ${currentFilter} orders found.`}</p>
                        <a href="/mobiles" class="btn btn-primary">
                            <i class="fas fa-shopping-cart"></i> Start Shopping
                        </a>
                    </div>
                `;
                return;
            }

            container.innerHTML = filteredOrders.map(order => `
                <div class="order-card">
                    <div class="order-header">
                        <div class="order-info">
                            <div class="order-info-item">
                                <span class="info-label">Order ID</span>
                                <span class="info-value">#${order.id}</span>
                            </div>
                            <div class="order-info-item">
                                <span class="info-label">Order Date</span>
                                <span class="info-value">${formatDate(order.date)}</span>
                            </div>
                            <div class="order-info-item">
                                <span class="info-label">Total Amount</span>
                                <span class="info-value" style="color: #667eea;">₹${(parseInt(order.total) || 0).toLocaleString()}</span>
                            </div>
                        </div>
                        <span class="order-status status-${order.status}">
                            <i class="fas fa-${getStatusIcon(order.status)}"></i>
                            ${order.status.charAt(0).toUpperCase() + order.status.slice(1)}
                        </span>
                    </div>
                    <div class="order-body">
                        <div class="order-items">
                            ${order.items.map(item => `
                                <div class="order-item">
                                    <img src="${item.image}" alt="${item.name}" class="item-image" onerror="this.style.display='none'; this.parentElement.querySelector('.img-fallback').style.display='flex';">
                                    <div class="img-fallback" style="width: 80px; height: 80px; border-radius: 10px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: none; align-items: center; justify-content: center; flex-shrink: 0;">
                                        <i class="fas fa-mobile-alt" style="color: white; font-size: 32px;"></i>
                                    </div>
                                    <div class="item-details">
                                        <div class="item-name">${item.name}</div>
                                        <div class="item-brand">${item.brand || 'N/A'}</div>
                                        <div class="item-meta">Qty: ${item.quantity || item.qty || 1} | ₹${(parseInt(item.price) || 0).toLocaleString()}</div>
                                    </div>
                                    <div class="item-price">₹${((parseInt(item.price) || 0) * (item.quantity || item.qty || 1)).toLocaleString()}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    <div class="order-footer">
                        <div class="order-total">
                            Total: <span>₹${(parseInt(order.total) || 0).toLocaleString()}</span>
                        </div>
                        <div class="order-actions">
                            <button class="btn btn-primary" onclick="viewOrderDetails('${order.id}')">
                                <i class="fas fa-eye"></i> View Details
                            </button>
                            ${order.status === 'pending' ? `
                                <button class="btn btn-danger" onclick="cancelOrder('${order.id}')">
                                    <i class="fas fa-times"></i> Cancel
                                </button>
                            ` : ''}
                            ${order.status === 'delivered' ? `
                                <button class="btn btn-secondary" onclick="reorder('${order.id}')">
                                    <i class="fas fa-redo"></i> Reorder
                                </button>
                            ` : ''}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function filterOrders(status) {
            currentFilter = status;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderOrders();
        }

        function updateStats() {
            const orders = getOrders();
            document.getElementById('statAll').textContent = orders.length;
            document.getElementById('statPending').textContent = orders.filter(o => o.status === 'pending').length;
            document.getElementById('statDelivered').textContent = orders.filter(o => o.status === 'delivered').length;
            document.getElementById('statCancelled').textContent = orders.filter(o => o.status === 'cancelled').length;
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
        }

        function getStatusIcon(status) {
            const icons = {
                pending: 'clock',
                processing: 'cog',
                shipped: 'shipping-fast',
                delivered: 'check-circle',
                cancelled: 'times-circle'
            };
            return icons[status] || 'circle';
        }

        // Order Actions
        function viewOrderDetails(orderId) {
            const orders = getOrders();
            const order = orders.find(o => o.id === orderId);
            if (!order) return;

            const timeline = getTimeline(order.status);

            document.getElementById('modalBody').innerHTML = `
                <div class="detail-section">
                    <div class="detail-title"><i class="fas fa-info-circle"></i> Order Information</div>
                    <div class="detail-row"><span class="detail-label">Order ID:</span><span class="detail-value">#${order.id}</span></div>
                    <div class="detail-row"><span class="detail-label">Order Date:</span><span class="detail-value">${formatDate(order.date)}</span></div>
                    <div class="detail-row"><span class="detail-label">Status:</span><span class="detail-value" style="color: ${getStatusColor(order.status)}">${order.status.toUpperCase()}</span></div>
                    <div class="detail-row"><span class="detail-label">Payment Method:</span><span class="detail-value">${order.payment}</span></div>
                </div>

                <div class="detail-section">
                    <div class="detail-title"><i class="fas fa-map-marker-alt"></i> Shipping Address</div>
                    <p style="color: #4a5568; line-height: 1.7;">${order.address}</p>
                </div>

                <div class="detail-section">
                    <div class="detail-title"><i class="fas fa-box"></i> Items Ordered</div>
                    ${order.items.map(item => `
                        <div style="display: flex; gap: 15px; padding: 15px; background: #f8fafc; border-radius: 10px; margin-bottom: 10px;">
                            <img src="${item.image}" style="width: 60px; height: 60px; border-radius: 8px; object-fit: cover;" onerror="this.style.display='none'; this.parentElement.querySelector('.img-fallback').style.display='flex';">
                            <div class="img-fallback" style="width: 60px; height: 60px; border-radius: 8px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: none; align-items: center; justify-content: center; flex-shrink: 0;">
                                <i class="fas fa-mobile-alt" style="color: white; font-size: 24px;"></i>
                            </div>
                            <div style="flex: 1;">
                                <div style="font-weight: 700; color: #1a202c;">${item.name}</div>
                                <div style="color: #667eea; font-size: 13px;">${item.brand || 'N/A'}</div>
                                <div style="color: #718096; font-size: 13px;">Qty: ${item.quantity || item.qty || 1} × ₹${(parseInt(item.price) || 0).toLocaleString()}</div>
                            </div>
                            <div style="font-weight: 800; color: #1a202c;">₹${((parseInt(item.price) || 0) * (item.quantity || item.qty || 1)).toLocaleString()}</div>
                        </div>
                    `).join('')}
                    <div style="display: flex; justify-content: space-between; padding: 15px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 10px; color: white; margin-top: 15px;">
                        <span style="font-weight: 700;">Total Amount</span>
                        <span style="font-weight: 800; font-size: 18px;">₹${(parseInt(order.total) || 0).toLocaleString()}</span>
                    </div>
                </div>

                <div class="detail-section">
                    <div class="detail-title"><i class="fas fa-truck"></i> Order Timeline</div>
                    <div class="timeline">
                        ${timeline.map((step, index) => `
                            <div class="timeline-item">
                                <div class="timeline-dot ${step.completed ? 'completed' : step.active ? 'active' : 'pending'}">
                                    <i class="fas fa-${step.icon}"></i>
                                </div>
                                <div class="timeline-content">
                                    <div class="timeline-title">${step.title}</div>
                                    <div class="timeline-date">${step.date || 'Pending'}</div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;

            document.getElementById('orderModal').classList.add('active');
        }

        function closeOrderModal() {
            document.getElementById('orderModal').classList.remove('active');
        }

        function getTimeline(status) {
            const steps = [
                { title: 'Order Placed', icon: 'shopping-bag', completed: true, active: false, date: 'Order confirmed' },
                { title: 'Processing', icon: 'cog', completed: ['processing', 'shipped', 'delivered'].includes(status), active: status === 'pending' },
                { title: 'Shipped', icon: 'shipping-fast', completed: ['shipped', 'delivered'].includes(status), active: status === 'processing' },
                { title: 'Delivered', icon: 'check-circle', completed: status === 'delivered', active: status === 'shipped' }
            ];
            
            if (status === 'cancelled') {
                return [
                    { title: 'Order Placed', icon: 'shopping-bag', completed: true, date: 'Order confirmed' },
                    { title: 'Order Cancelled', icon: 'times-circle', completed: true, active: false, date: 'Order has been cancelled' }
                ];
            }
            
            return steps;
        }

        function getStatusColor(status) {
            const colors = {
                pending: '#d97706',
                processing: '#1e40af',
                shipped: '#3730a3',
                delivered: '#059669',
                cancelled: '#dc2626'
            };
            return colors[status] || '#667eea';
        }

        function cancelOrder(orderId) {
            if (!confirm('Are you sure you want to cancel this order?')) return;
            
            let orders = getOrders();
            const index = orders.findIndex(o => o.id === orderId);
            if (index !== -1) {
                orders[index].status = 'cancelled';
                localStorage.setItem('orders', JSON.stringify(orders));
                renderOrders();
                updateStats();
                showNotification('Order cancelled successfully', 'success');
            }
        }

        function reorder(orderId) {
            const orders = getOrders();
            const order = orders.find(o => o.id === orderId);
            if (!order) return;

            // Add items to cart
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            order.items.forEach(item => {
                cart.push({
                    name: item.name,
                    brand: item.brand,
                    price: item.price,
                    quantity: item.qty,
                    image: item.image
                });
            });
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartCount();
            showNotification('Items added to cart', 'success');
            
            setTimeout(() => {
                window.location.href = '/cart';
            }, 1500);
        }

        // Notification
        function showNotification(message, type = 'success') {
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.innerHTML = `
                <i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i>
                ${message}
            `;
            document.body.appendChild(notification);

            setTimeout(() => {
                notification.style.animation = 'slideIn 0.3s ease reverse';
                setTimeout(() => notification.remove(), 300);
            }, 3000);
        }
    </script>
</body>
</html>
