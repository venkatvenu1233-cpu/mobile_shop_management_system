<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Shopping Cart - Mobile Engineer</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #1a202c;
        }

        .cart-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .cart-header {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header-title h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-title i {
            font-size: 2.5rem;
            color: #667eea;
        }

        .cart-stats {
            display: flex;
            gap: 30px;
            align-items: center;
        }

        .stat-card {
            background: linear-gradient(135deg, #f8fafc, #e2e8f0);
            padding: 15px 25px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }

        .stat-number {
            font-size: 1.8rem;
            font-weight: 700;
            color: #2d3748;
            display: block;
        }

        .stat-label {
            font-size: 0.9rem;
            color: #718096;
            margin-top: 5px;
        }

        /* Main Content */
        .cart-content {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 30px;
            margin-bottom: 30px;
        }

        /* Cart Items Section */
        .cart-items-section {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e2e8f0;
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #2d3748;
        }

        .clear-cart-btn {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .clear-cart-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(239, 68, 68, 0.3);
        }

        /* Profile Dropdown Styles - Executive Design */
        .profile-dropdown {
            position: relative;
        }

        .profile-button {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border: 2px solid #334155;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .profile-button:hover {
            background: linear-gradient(135deg, #334155 0%, #1e293b 100%);
            border-color: #667eea;
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .profile-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
        }

        .profile-menu {
            position: absolute;
            top: calc(100% + 10px);
            right: 0;
            min-width: 220px;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border: 1px solid #334155;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px) scale(0.95);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
            overflow: hidden;
        }

        .profile-menu.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0) scale(1);
        }

        .profile-header {
            padding: 20px;
            background: linear-gradient(135deg, #334155 0%, #1e293b 100%);
            border-bottom: 1px solid #475569;
        }

        .profile-name {
            font-size: 16px;
            font-weight: 700;
            color: white;
            margin-bottom: 4px;
        }

        .profile-email {
            font-size: 12px;
            color: #94a3b8;
        }

        .profile-menu-items {
            padding: 8px;
        }

        .profile-menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 10px;
            color: #e2e8f0;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .profile-menu-item:hover {
            background: linear-gradient(135deg, #334155 0%, #475569 100%);
            color: white;
            transform: translateX(4px);
        }

        .profile-menu-item i {
            width: 20px;
            text-align: center;
            font-size: 16px;
            color: #667eea;
        }

        .profile-menu-item:hover i {
            color: #764ba2;
        }

        .profile-menu-divider {
            height: 1px;
            background: #334155;
            margin: 8px 12px;
        }

        .profile-menu-item.logout {
            color: #ef4444;
        }

        .profile-menu-item.logout:hover {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
        }

        .profile-menu-item.logout i {
            color: #ef4444;
        }

        .profile-menu-item.logout:hover i {
            color: white;
        }

        /* Cart Items */
        .cart-items {
            max-height: 600px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .cart-items::-webkit-scrollbar {
            width: 8px;
        }

        .cart-items::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 10px;
        }

        .cart-items::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 10px;
        }

        .cart-item {
            background: linear-gradient(135deg, #ffffff, #f8fafc);
            border: 1px solid #e2e8f0;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .cart-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #667eea, #764ba2, #f093fb);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .cart-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.15);
            border-color: #cbd5e0;
        }

        .item-content {
            display: grid;
            grid-template-columns: auto 1fr auto;
            gap: 20px;
            align-items: center;
        }

        .item-image {
            width: 80px;
            height: 80px;
            border-radius: 12px;
            object-fit: cover;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
            border: 2px solid #e2e8f0;
        }

        .item-details {
            flex: 1;
        }

        .item-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .item-brand {
            font-size: 0.9rem;
            color: #718096;
            margin-bottom: 5px;
        }

        .item-price {
            font-size: 1.3rem;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 12px;
        }

        .item-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .quantity-controls {
            display: flex;
            align-items: center;
            background: #f8fafc;
            border-radius: 10px;
            padding: 5px;
            border: 1px solid #e2e8f0;
        }

        .quantity-btn {
            width: 32px;
            height: 32px;
            border: none;
            background: white;
            color: #4a5568;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .quantity-btn:hover {
            background: #667eea;
            color: white;
            transform: scale(1.1);
        }

        .quantity-input {
            width: 50px;
            height: 32px;
            border: none;
            text-align: center;
            font-weight: 600;
            background: transparent;
            color: #2d3748;
            font-size: 1rem;
        }

        .remove-btn {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .remove-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(239, 68, 68, 0.3);
        }

        .item-subtotal {
            font-size: 1.2rem;
            font-weight: 700;
            color: #2d3748;
            text-align: right;
        }

        /* Summary Section */
        .summary-section {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            position: sticky;
            top: 20px;
        }

        .summary-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #2d3748;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .summary-title i {
            color: #667eea;
        }

        .promo-section {
            margin-bottom: 25px;
        }

        .promo-input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .promo-input {
            flex: 1;
            padding: 15px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .promo-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .promo-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .promo-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #e2e8f0;
            font-size: 1rem;
        }

        .summary-row:last-child {
            border-bottom: none;
        }

        .summary-total {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 2px solid #e2e8f0;
        }

        .summary-total .summary-label {
            font-size: 1.3rem;
            font-weight: 700;
            color: #2d3748;
        }

        .summary-total .summary-value {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .checkout-btn {
            width: 100%;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border: none;
            padding: 20px;
            border-radius: 15px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
        }

        .checkout-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            animation: slide 2s infinite;
        }

        @keyframes slide {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        .checkout-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 40px rgba(16, 185, 129, 0.3);
        }

        /* Empty Cart */
        .empty-cart {
            text-align: center;
            padding: 60px 40px;
            color: #718096;
        }

        .empty-cart i {
            font-size: 5rem;
            color: #cbd5e0;
            margin-bottom: 20px;
        }

        .empty-cart h3 {
            font-size: 1.8rem;
            font-weight: 700;
            color: #2d3748;
            margin-bottom: 10px;
        }

        .empty-cart p {
            font-size: 1.1rem;
            margin-bottom: 25px;
        }

        .continue-shopping-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            text-decoration: none;
            padding: 15px 30px;
            border-radius: 12px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
        }

        .continue-shopping-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        /* Responsive Design */
        @media (max-width: 1024px) {
            .cart-content {
                grid-template-columns: 1fr;
            }

            .summary-section {
                position: static;
            }

            .header-content {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }

            .cart-stats {
                width: 100%;
                justify-content: space-between;
            }
        }

        @media (max-width: 768px) {
            .cart-container {
                padding: 15px;
            }

            .header-title h1 {
                font-size: 2rem;
            }

            .stat-card {
                padding: 12px 20px;
            }

            .stat-number {
                font-size: 1.5rem;
            }

            .item-content {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .item-actions {
                justify-content: space-between;
            }
        }

        /* Animations */
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .pulse {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }
    </style>
</head>
<body>
    <div class="cart-container fade-in">
        <!-- Header -->
        <div class="cart-header">
            <div class="header-content">
                <div class="header-title">
                    <i class="fas fa-shopping-cart"></i>
                    <h1>Shopping Cart</h1>
                </div>
                <div style="display: flex; gap: 15px; align-items: center;">
                    <div class="cart-stats">
                        <div class="stat-card">
                            <span class="stat-number" id="itemCount">0</span>
                            <span class="stat-label">Items</span>
                        </div>
                        <div class="stat-card">
                            <span class="stat-number" id="cartTotal">₹0</span>
                            <span class="stat-label">Total</span>
                        </div>
                    </div>
                    <div class="profile-dropdown">
                        <button class="profile-button" onclick="toggleProfileMenu()">
                            <div class="profile-avatar">
                                <i class="fas fa-user"></i>
                            </div>
                            <span>Profile</span>
                            <i class="fas fa-chevron-down" style="font-size: 12px;"></i>
                        </button>
                        <div class="profile-menu" id="profileMenu">
                            <div class="profile-header">
                                <div class="profile-name">User Name</div>
                                <div class="profile-email">user@example.com</div>
                            </div>
                            <div class="profile-menu-items">
                                <a href="/edit-profile" class="profile-menu-item">
                                    <i class="fas fa-edit"></i>
                                    <span>Edit Profile</span>
                                </a>
                                <a href="/saved-address" class="profile-menu-item">
                                    <i class="fas fa-map-marker-alt"></i>
                                    <span>Saved Addresses</span>
                                </a>
                                <a href="/orders" class="profile-menu-item">
                                    <i class="fas fa-shopping-bag"></i>
                                    <span>My Orders</span>
                                </a>
                                <a href="/service_requests" class="profile-menu-item">
                                    <i class="fas fa-tools"></i>
                                    <span>My Service Requests</span>
                                </a>
                                <div class="profile-menu-divider"></div>
                                <a href="#" class="profile-menu-item logout" onclick="handleLogout()">
                                    <i class="fas fa-sign-out-alt"></i>
                                    <span>Logout</span>
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="cart-content">
            <!-- Cart Items Section -->
            <div class="cart-items-section">
                <div class="section-header">
                    <h2 class="section-title">Your Items</h2>
                    <button class="clear-cart-btn" onclick="clearCart()">
                        <i class="fas fa-trash"></i>
                        Clear Cart
                    </button>
                </div>
                
                <div class="cart-items" id="cartItems">
                    <!-- Cart items will be dynamically added here -->
                </div>
            </div>

            <!-- Summary Section -->
            <div class="summary-section">
                <h3 class="summary-title">
                    <i class="fas fa-receipt"></i>
                    Order Summary
                </h3>
                
                <div class="promo-section">
                    <div class="promo-input-group">
                        <input type="text" class="promo-input" placeholder="Enter promo code" id="promoCode">
                        <button class="promo-btn" onclick="applyPromo()">Apply</button>
                    </div>
                </div>

                <div class="summary-row">
                    <span>Subtotal</span>
                    <span id="subtotal">₹0</span>
                </div>
                
                <div class="summary-row">
                    <span>Discount</span>
                    <span id="discount" style="color: #10b981;">-₹0</span>
                </div>
                
                <div class="summary-row">
                    <span>Shipping</span>
                    <span id="shipping" style="color: #10b981;">Free</span>
                </div>

                <div class="summary-row summary-total">
                    <span class="summary-label">Total</span>
                    <span class="summary-value" id="total">₹0</span>
                </div>

                <button class="checkout-btn pulse" onclick="checkout()">
                    <i class="fas fa-credit-card"></i>
                    Proceed to Checkout
                </button>
            </div>
        </div>
    </div>

    <script>
        // Cart functionality
        let cart = JSON.parse(localStorage.getItem('cart')) || [];

        function renderCartItems() {
            const cartItemsContainer = document.getElementById('cartItems');
            
            if (cart.length === 0) {
                cartItemsContainer.innerHTML = `
                    <div class="empty-cart">
                        <i class="fas fa-shopping-cart"></i>
                        <h3>Your cart is empty</h3>
                        <p>Add some amazing products to get started!</p>
                        <a href="/mobiles" class="continue-shopping-btn">
                            <i class="fas fa-arrow-left"></i>
                            Continue Shopping
                        </a>
                    </div>
                `;
                updateSummary();
                return;
            }

            cartItemsContainer.innerHTML = cart.map((item, index) => `
                <div class="cart-item">
                    <div class="item-content">
                        <img src="${item.image}" alt="${item.name}" class="item-image">
                        <div class="item-details">
                            <div class="item-name">${item.name}</div>
                            <div class="item-brand">${item.brand}</div>
                            <div class="item-price">₹${item.price.toLocaleString()}</div>
                            <div class="item-actions">
                                <div class="quantity-controls">
                                    <button class="quantity-btn" onclick="updateQuantity(${index}, -1)">−</button>
                                    <input type="number" class="quantity-input" value="${item.quantity}" 
                                           onchange="setQuantity(${index}, this.value)" min="1" max="10">
                                    <button class="quantity-btn" onclick="updateQuantity(${index}, 1)">+</button>
                                </div>
                                <button class="remove-btn" onclick="removeItem(${index})">
                                    <i class="fas fa-trash"></i>
                                    Remove
                                </button>
                            </div>
                        </div>
                        <div class="item-subtotal">₹${(item.price * item.quantity).toLocaleString()}</div>
                    </div>
                </div>
            `).join('');
            
            updateSummary();
        }

        function updateQuantity(index, change) {
            cart[index].quantity += change;
            if (cart[index].quantity < 1) cart[index].quantity = 1;
            if (cart[index].quantity > 10) cart[index].quantity = 10;
            saveCart();
            renderCartItems();
        }

        function setQuantity(index, value) {
            const quantity = parseInt(value);
            if (quantity >= 1 && quantity <= 10) {
                cart[index].quantity = quantity;
                saveCart();
                renderCartItems();
            }
        }

        function removeItem(index) {
            const item = cart[index];
            cart.splice(index, 1);
            saveCart();
            renderCartItems();
            
            // Show notification
            showNotification(`${item.name} removed from cart`, 'info');
        }

        function clearCart() {
            if (cart.length === 0) return;
            
            if (confirm('Are you sure you want to clear your entire cart?')) {
                cart = [];
                saveCart();
                renderCartItems();
                showNotification('Cart cleared successfully', 'success');
            }
        }

        function saveCart() {
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartCount();
        }

        function updateCartCount() {
            const cartCount = document.getElementById('itemCount');
            const cartTotal = document.getElementById('cartTotal');
            
            if (cartCount && cartTotal) {
                const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
                const totalAmount = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
                
                cartCount.textContent = totalItems;
                cartTotal.textContent = `₹${totalAmount.toLocaleString()}`;
            }
        }

        function updateSummary() {
            const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const discount = 0; // Can be modified based on promo
            const shipping = 0; // Free shipping for all orders
            const total = subtotal - discount + shipping;

            document.getElementById('subtotal').textContent = `₹${subtotal.toLocaleString()}`;
            document.getElementById('discount').textContent = discount > 0 ? `-₹${discount.toLocaleString()}` : '₹0';
            document.getElementById('shipping').textContent = 'Free';
            document.getElementById('total').textContent = `₹${total.toLocaleString()}`;
        }

        function applyPromo() {
            const promoCode = document.getElementById('promoCode').value.toUpperCase().trim();
            
            if (!promoCode) {
                showNotification('Please enter a promo code', 'warning');
                return;
            }

            // Demo promo codes
            const promoCodes = {
                'SAVE20': 0.20,
                'SAVE10': 0.10,
                'WELCOME': 0.15
            };

            if (promoCodes[promoCode]) {
                showNotification(`Promo code applied! ${promoCodes[promoCode] * 100}% discount`, 'success');
                updateSummary(); // Recalculate with discount
            } else {
                showNotification('Invalid promo code', 'error');
            }
        }

        function checkout() {
            if (cart.length === 0) {
                showNotification('Your cart is empty! Add some items first.', 'warning');
                return;
            }
            
            // Store cart data for checkout page
            const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const shipping = 0; // Free shipping
            const total = subtotal + shipping;
            
            // Store checkout data in localStorage
            localStorage.setItem('checkoutData', JSON.stringify({
                items: cart,
                subtotal: `₹${subtotal.toLocaleString()}`,
                discount: '₹0',
                shipping: '₹0',
                total: `₹${total.toLocaleString()}`
            }));
            
            showNotification(`Proceeding to checkout for ₹${total.toLocaleString()}`, 'success');
            
            // Redirect to checkout page
            setTimeout(() => {
                window.location.href = '/checkout';
            }, 2000);
        }

        function showNotification(message, type = 'info') {
            // Create notification element
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                padding: 15px 20px;
                border-radius: 10px;
                color: white;
                font-weight: 600;
                z-index: 10000;
                animation: slideIn 0.3s ease;
                box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            `;

            // Set background color based on type
            const colors = {
                success: 'linear-gradient(135deg, #10b981, #059669)',
                error: 'linear-gradient(135deg, #ef4444, #dc2626)',
                warning: 'linear-gradient(135deg, #f59e0b, #d97706)',
                info: 'linear-gradient(135deg, #3b82f6, #2563eb)'
            };
            notification.style.background = colors[type] || colors.info;
            
            notification.textContent = message;
            document.body.appendChild(notification);

            // Remove after 3 seconds
            setTimeout(() => {
                notification.style.animation = 'slideOut 0.3s ease';
                setTimeout(() => notification.remove(), 300);
            }, 3000);
        }

        // Add to Cart function (called from other pages)
        function addToCart(productName) {
            // Create item with realistic data
            const item = {
                name: productName,
                brand: 'Mobile Engineer',
                price: Math.floor(Math.random() * 3000) + 500, // ₹500-3500
                quantity: 1,
                image: `https://picsum.photos/seed/${productName.replace(/\s+/g, '')}/80/80.jpg`
            };
            
            cart.push(item);
            saveCart();
            renderCartItems();
            
            // Show success notification
            showNotification(`${productName} added to cart!`, 'success');
        }

        // Add CSS for animations
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideIn {
                from { transform: translateX(100%); opacity: 0; }
                to { transform: translateX(0); opacity: 1; }
            }
            @keyframes slideOut {
                from { transform: translateX(0); opacity: 1; }
                to { transform: translateX(100%); opacity: 0; }
            }
        `;
        document.head.appendChild(style);

        // Profile Dropdown Functions
        function toggleProfileMenu() {
            const menu = document.getElementById('profileMenu');
            menu.classList.toggle('active');
        }

        function handleLogout() {
            localStorage.removeItem('cart');
            localStorage.removeItem('checkoutData');
            showNotification('Logged out successfully', 'success');
            setTimeout(() => {
                window.location.href = '/login';
            }, 1000);
        }

        // Close profile menu when clicking outside
        document.addEventListener('click', function(event) {
            const profileDropdown = document.querySelector('.profile-dropdown');
            const profileMenu = document.getElementById('profileMenu');
            if (profileDropdown && !profileDropdown.contains(event.target)) {
                profileMenu.classList.remove('active');
            }
        });

        // Initialize cart on page load
        document.addEventListener('DOMContentLoaded', function() {
            renderCartItems();
            updateCartCount();
        });
    </script>
</body>
</html>
